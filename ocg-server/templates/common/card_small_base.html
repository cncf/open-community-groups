<a href="{% block href %}{% endblock %}"
   class="group flex h-full min-w-0 select-none rounded-2xl focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary-500"
   {% block anchor_attributes %}{% endblock %}>
  <article class="flex h-full w-full min-w-0 flex-col overflow-hidden rounded-2xl border border-stone-200 bg-white transition-colors group-hover:border-stone-300">
    <div class="flex min-w-0 items-start gap-3 px-3.5 pt-3.5 md:gap-4 md:px-4 md:pt-4">
      <div class="relative shrink-0 transition-opacity group-hover:opacity-75">
        {% block logo %}{% endblock %}
        {% block overlay %}{% endblock %}
      </div>

      <div class="min-w-0 flex-1">
        <div class="flex min-h-[60px] flex-col justify-start">
          <div class="card-header">
            {% block preheader %}{% endblock %}
          </div>

          <div class="card-title !mt-1 !mb-0 !h-auto !line-clamp-2 text-[0.98rem]/5 md:text-[1.02rem]/5 group-hover:underline">
            {% block title %}{% endblock %}
          </div>
        </div>
      </div>
    </div>

    {% block details %}{% endblock %}
    {% block details_spacing %}{% endblock %}

    <div class="mt-auto px-3.5 pb-3.5 md:px-4 md:pb-4">
      <div class="rounded-xl bg-stone-50 px-3 py-2.5 md:px-3.5 md:py-3">
        {% block footer %}{% endblock %}
      </div>
    </div>
  </article>
</a>
