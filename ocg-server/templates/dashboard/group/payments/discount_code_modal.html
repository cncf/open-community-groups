<div data-ticketing-role="discount-modal"
     class="fixed inset-0 z-[1000] hidden items-center justify-center overflow-y-auto overflow-x-hidden"
     role="dialog"
     aria-modal="true"
     aria-labelledby="discount-code-modal-title"
     data-pending-changes-ignore>
  <div class="absolute inset-0 bg-stone-950 opacity-35"
       data-ticketing-action="close-modal"></div>
  <div class="modal-panel max-w-4xl p-4">
    <div class="modal-card rounded-2xl">
      <div class="flex items-center justify-between border-b border-stone-200 p-5 shrink-0">
        <h3 id="discount-code-modal-title"
            data-ticketing-role="modal-title"
            class="text-xl font-semibold text-stone-900">Add discount code</h3>
        <button type="button"
                data-ticketing-action="close-modal"
                class="group inline-flex h-8 w-8 items-center justify-center rounded-lg bg-transparent text-sm text-stone-400 transition-colors hover:bg-stone-100">
          <div class="svg-icon h-4 w-4 bg-stone-400 transition-colors group-hover:bg-stone-600 icon-close"></div>
          <span class="sr-only">Close modal</span>
        </button>
      </div>

      <div class="modal-body flex-1 space-y-6 p-6">
        <div class="grid gap-4 md:grid-cols-2">
          <div>
            <label class="form-label" for="discount-title-draft">
              Title <span class="asterisk">*</span>
            </label>
            <div class="mt-2">
              <input id="discount-title-draft"
                     data-discount-modal-field
                     data-discount-field="title"
                     type="text"
                     class="input-primary"
                     maxlength="120"
                     placeholder="Early supporter"
                     required>
            </div>
          </div>

          <div>
            <label class="form-label" for="discount-code-draft">
              Code <span class="asterisk">*</span>
            </label>
            <div class="mt-2">
              <input id="discount-code-draft"
                     data-discount-modal-field
                     data-discount-field="code"
                     type="text"
                     class="input-primary uppercase"
                     maxlength="40"
                     placeholder="EARLY20"
                     required>
            </div>
          </div>
        </div>

        <div>
          <label class="inline-flex cursor-pointer items-center">
            <input type="checkbox" class="sr-only peer" data-discount-field="active">
            <div class="relative h-6 w-11 rounded-full bg-stone-200 transition peer-checked:bg-primary-500 peer-checked:after:translate-x-full after:absolute after:start-[2px] after:top-[2px] after:h-5 after:w-5 after:rounded-full after:border after:border-stone-200 after:bg-white after:transition-all after:content-['']">
            </div>
            <span class="ms-3 text-sm font-medium text-stone-900">Active</span>
          </label>
        </div>

        <div class="grid gap-4 md:grid-cols-2">
          <div>
            <label class="form-label" for="discount-kind-draft">Discount type</label>
            <div class="mt-2">
              <select id="discount-kind-draft"
                      data-discount-field="kind"
                      class="input-primary">
                <option value="percentage">Percentage</option>
                <option value="fixed_amount">Fixed amount</option>
              </select>
            </div>
          </div>

          <div data-ticketing-role="discount-value-field"></div>

          <div>
            <label class="form-label" for="discount-total-draft">Maximum redemptions</label>
            <div class="mt-2">
              <input id="discount-total-draft"
                     data-discount-field="total_available"
                     type="number"
                     min="0"
                     class="input-primary"
                     placeholder="50">
            </div>
          </div>

          <div>
            <label class="form-label" for="discount-available-draft">Uses remaining</label>
            <div class="mt-2">
              <input id="discount-available-draft"
                     data-discount-field="available"
                     type="number"
                     min="0"
                     class="input-primary"
                     placeholder="Leave blank unless you need a manual override">
            </div>
          </div>

          <div>
            <label class="form-label" for="discount-starts-draft">Starts at</label>
            <div class="mt-2">
              <input id="discount-starts-draft"
                     data-discount-field="starts_at"
                     type="datetime-local"
                     class="input-primary">
            </div>
          </div>

          <div>
            <label class="form-label" for="discount-ends-draft">Ends at</label>
            <div class="mt-2">
              <input id="discount-ends-draft"
                     data-discount-field="ends_at"
                     type="datetime-local"
                     class="input-primary">
            </div>
          </div>
        </div>
      </div>

      <div class="flex items-center justify-end gap-3 border-t border-stone-200 p-5 shrink-0">
        <button type="button"
                data-ticketing-action="close-modal"
                class="btn-secondary">Cancel</button>
        <button type="button"
                data-ticketing-action="save-discount"
                class="btn-primary">
          <span data-ticketing-role="save-label">Add discount code</span>
        </button>
      </div>
    </div>
  </div>
</div>
