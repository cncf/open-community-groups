{% extends "community/group_card.html" -%}

{% block preheader -%}
  <span>
    <span class="hidden text-primary-500 sm:inline">{{ group.community_display_name }}</span>
    <span class="px-1 hidden sm:inline">·</span>
    {% if let Some(region) = &group.region -%}
      {{ region.name }}
    {% else -%}
      {{ group.category.name }}
    {% endif -%}
  </span>
{% endblock preheader -%}
