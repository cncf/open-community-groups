{% extends "common/base.html" -%}

{% block content -%}
  <div class="container mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-16 sm:py-20 lg:py-24">
    <div class="mx-auto max-w-2xl text-center">
      <p class="text-sm font-semibold uppercase tracking-wide text-primary-700">Page not found</p>
      <h1 class="mt-4 text-3xl sm:text-4xl lg:text-5xl font-semibold tracking-tight text-stone-950">
        We could not find that page
      </h1>
      <p class="mt-6 text-base sm:text-lg leading-8 text-stone-600">
        The page you requested may have moved, been deleted, or the link may be incorrect.
      </p>
      <div class="mt-10">
        <a href="/"
           hx-boost="true"
           hx-target="body"
           class="btn-primary-anchor text-base py-3 px-7 font-semibold">Go to home page</a>
      </div>
    </div>
  </div>
{% endblock content -%}
