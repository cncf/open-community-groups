name: End-to-end tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - cynthia-sg/e2e
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: smoke
            command: npx playwright test --config tests/e2e/playwright.config.ts --project=chromium-smoke --project=firefox-smoke --project=webkit-smoke
            artifact_name: playwright-artifacts-smoke
          - suite: deep
            command: npx playwright test --config tests/e2e/playwright.config.ts --project=chromium-deep --project=chromium-mobile-deep
            artifact_name: playwright-artifacts-deep
          - suite: visual
            command: npx playwright test --config tests/e2e/playwright.config.ts tests/e2e/visual/visual.spec.ts --project=chromium-deep --project=chromium-mobile-deep
            artifact_name: playwright-artifacts-visual
    permissions:
      contents: read
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ocg_tests_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ocg_tests_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      OCG_DB_HOST: 127.0.0.1
      OCG_DB_NAME_E2E: ocg_tests_e2e
      OCG_DB_PASSWORD: postgres
      OCG_E2E_BASE_URL: http://127.0.0.1:9000
      OCG_PG_BIN: /usr/bin
      PGPASSWORD: postgres

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install just
        run: cargo install just --locked

      - name: Install Node.js dependencies
        run: npm install --no-package-lock

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install Tailwind CSS
        run: |
          curl -sL https://github.com/tailwindlabs/tailwindcss/releases/download/v4.1.10/tailwindcss-linux-x64 -o tailwindcss
          chmod +x tailwindcss
          sudo mv tailwindcss /usr/local/bin/tailwindcss

      - name: Install tern
        run: |
          curl -sL https://github.com/jackc/tern/releases/download/v2.3.2/tern_2.3.2_linux_amd64.tar.gz -o tern.tar.gz
          tar -xzf tern.tar.gz
          sudo mv tern /usr/local/bin/tern

      - name: Set up e2e database
        run: just e2e-db-setup

      - name: Write e2e server config
        run: just e2e-write-server-config

      - name: Build e2e server binary
        run: cargo build --bin ocg-server

      - name: Run Playwright ${{ matrix.suite }} tests
        env:
          OCG_E2E_START_SERVER: "true"
          OCG_E2E_SERVER_CMD: ${{ github.workspace }}/target/debug/ocg-server -c /tmp/ocg-e2e.yml
        run: ${{ matrix.command }}

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            playwright-report/
            test-results/
