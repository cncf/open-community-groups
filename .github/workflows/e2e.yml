name: End-to-end tests

on:
  push:
    branches:
      - cynthia-sg/e2e
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: smoke
            command: yarn test:e2e:smoke
            artifact_name: playwright-artifacts-smoke
          - suite: deep
            command: yarn test:e2e:deep
            artifact_name: playwright-artifacts-deep
          - suite: visual
            command: yarn playwright test --config tests/e2e/playwright.config.ts tests/e2e/pages/visual.spec.ts --project=chromium-deep --project=chromium-mobile-deep
            artifact_name: playwright-artifacts-visual
    permissions:
      contents: read
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ocg_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ocg_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGPASSWORD: postgres

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install yarn dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install Tailwind CSS
        run: |
          curl -sL https://github.com/tailwindlabs/tailwindcss/releases/download/v4.1.10/tailwindcss-linux-x64 -o tailwindcss
          chmod +x tailwindcss
          sudo mv tailwindcss /usr/local/bin/tailwindcss

      - name: Install tern
        run: |
          curl -sL https://github.com/jackc/tern/releases/download/v2.3.2/tern_2.3.2_linux_amd64.tar.gz -o tern.tar.gz
          tar -xzf tern.tar.gz
          sudo mv tern /usr/local/bin/tern

      - name: Write e2e tern config
        run: |
          cat <<'EOF' > /tmp/ocg-tern-e2e.conf
          [database]
          host = 127.0.0.1
          port = 5432
          database = ocg_e2e
          user = postgres
          password = postgres
          EOF

      - name: Enable database extensions
        run: |
          psql -h 127.0.0.1 -U postgres -d ocg_e2e -c "CREATE EXTENSION IF NOT EXISTS pgcrypto"
          psql -h 127.0.0.1 -U postgres -d ocg_e2e -c "CREATE EXTENSION IF NOT EXISTS postgis"

      - name: Run database migrations
        working-directory: database/migrations
        env:
          TERN_CONF: /tmp/ocg-tern-e2e.conf
        run: ./migrate.sh

      - name: Load e2e seed data
        run: psql -h 127.0.0.1 -U postgres -d ocg_e2e -f database/tests/data/e2e.sql

      - name: Normalize e2e user passwords
        run: psql -h 127.0.0.1 -U postgres -d ocg_e2e -c "update \"user\" set password = '\$argon2id\$v=19\$m=19456,t=2,p=1\$q55jlxUx8bffhFM3xN36ZA\$te6OiWkZ/q35lpSEAZbd/A3iJyCByxbive9F61sTp7g' where username like 'e2e-%'"

      - name: Write e2e server config
        run: |
          cat <<'EOF' > /tmp/ocg-e2e.yml
          db:
            host: 127.0.0.1
            port: 5432
            dbname: ocg_e2e
            user: postgres
            password: "postgres"
          email:
            from_address: noreply@test.com
            from_name: Test
            smtp:
              host: localhost
              port: 1025
              username: ""
              password: ""
          images:
            provider: db
          server:
            addr: 127.0.0.1:9000
            base_url: http://127.0.0.1:9000
            cookie:
              secure: false
            disable_referer_checks: false
            login:
              email: true
              github: true
              linuxfoundation: false
            oauth2:
              github:
                auth_url: https://example.test/oauth/authorize
                client_id: e2e-client
                client_secret: e2e-secret
                redirect_uri: http://127.0.0.1:9000/log-in/oauth2/github/callback
                scopes:
                  - read:user
                  - user:email
                token_url: https://example.test/oauth/token
            oidc: {}
          EOF

      - name: Build e2e server binary
        run: cargo build --bin ocg-server

      - name: Start server and wait for it to be ready
        uses: JarvusInnovations/background-action@v1
        with:
          run: ${{ github.workspace }}/target/debug/ocg-server -c /tmp/ocg-e2e.yml &
          wait-on: http://127.0.0.1:9000/health-check
          tail: true
          log-output: "stdout,stderr"
          log-output-if: true

      - name: Run Playwright ${{ matrix.suite }} tests
        env:
          OCG_E2E_BASE_URL: http://127.0.0.1:9000
        run: ${{ matrix.command }}

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            playwright-report/
            test-results/
